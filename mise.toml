#:schema https://mise.en.dev/schema/mise.json

[settings]
python.compile = false
lockfile = true

[tools]
# NOTE: Python
python = "3.13"
uv = "0.11"
# NOTE: Formatter and linters
ruff = "0.15"
shellcheck = "0.11"
shfmt = "3.13"
oxfmt = "0.43"
tombi = "0.9"
# NOTE: Utils
gum = "0.17"
prek = "0.3"

[env]
_.python.venv = { create = true, path = ".venv" }
PYTHONPATH = "{{ config_root }}/src"
DJANGO_SETTINGS_MODULE = "watchtower_ce.settings"
DATABASE_URL = "postgresql://wtce:wtce@localhost:5432/wtce"
LLM_INSTANCE_POOL_SIZE = 1
LLM_SERVER_URL = "http://localhost:6767"

[tasks.install]
description = "Install project dependencies"
alias = "i"
usage = '''
flag "-a --all-dependencies" help="Install all dependencies" default="false"
'''
run = [
  "mise install",
  "uv sync --frozen --active {% if usage.all_dependencies %}--all-groups --all-extras{% else %}--extra dev --extra tests{% endif %}",
  "prek install",
]

[tasks.postgres]
description = "Start development PostgreSQL database"
tools = { docker-cli = "29" }
alias = "pg"
usage = '''
flag "-n --container-name <container-name>" help="Name for the postgres container" default="wtce-postgres-dev"
flag "-i --container-image <container-image>" help="Image to use for creating the postgres container" default="postgres:18-alpine"
flag "-P --port <port>" help="Port to listen on for postgresql connections" default="5432"
flag "-u --username <username>" help="superuser username" default="wtce"
flag "-p --password <password>" help="superuser password" default="wtce"
flag "-d --database <database>" help="initial database name" default="wtce"
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail

if [ -n "$(docker container ls -qaf "name=${usage_container_name}")" ]; then
  gum log -l info "Starting postgres container: ${usage_container_name?}"
  docker container start "${usage_container_name}"
else
  gum spin --title "Creating postgres container" -- \
  docker container run -d \
  --name "${usage_container_name}" \
  -e "POSTGRES_USER=${usage_username}" \
  -e "POSTGRES_PASSWORD=${usage_password}" \
  -e "POSTGRES_DB=${usage_database}" \
  -p "${usage_port}:5432" \
  -v "${usage_container_name}-data:/var/lib/postgresql" \
  "${usage_container_image}"
fi


gum spin --title "Waiting for postgres to be ready" -- \
  timeout 90s bash -c \
  "until docker exec ${usage_container_name} pg_isready -U ${usage_username} -d ${usage_database} -q; \
  do sleep 1; done"

gum log -l info "Postgres is ready"
'''

[tasks.redis]
description = "Start development Redis instance"
tools = { docker-cli = "29" }
usage = '''
flag "-n --container-name <container-name>" help="Name for the redis container" default="wtce-redis-dev"
flag "-i --container-image <container-image>" help="Image to use for creating the redis container" default="redis:alpine"
flag "-P --port <port>" help="Port to listen on for redis connections" default="6379"
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail

if [ -n "$(docker container ls -qaf "name=${usage_container_name}")" ]; then
  gum log -l info "Starting redis container: ${usage_container_name?}"
  docker container start "${usage_container_name}"
else
  gum spin --title "Creating redis container" -- \
  docker container run -d \
  --name "${usage_container_name}" \
  -p "${usage_port}:6379" \
  "${usage_container_image}" \
  redis-server
fi

gum spin --title "Waiting for redis to be ready" -- \
  timeout 60s bash -c \
  "until docker exec ${usage_container_name} redis-cli ping 2>/dev/null | grep -q PONG; \
  do sleep 1; done"

gum log -l info "Redis is ready"
'''

[tasks.migrate]
description = "Run database migrations"
depends = ["postgres"]
alias = "m"
run = '''
django-admin makemigrations
django-admin migrate
'''

[tasks.superuser]
description = "Create a superuser"
depends = ["migrate"]
alias = "su"
usage = '''
flag "-u --username <username>" help="superuser username" default="admin"
flag "-e --email <email>" help="superuser email" default="admin@example.com"
flag "-p --password <password>" help="superuser password" default="admin"
'''
run = '''
DJANGO_SUPERUSER_PASSWORD=${usage_password} django-admin createsuperuser \
--username ${usage_username} \
--email ${usage_email} \
--noinput
'''

[tasks.devserver]
description = "Run development server"
depends = ["migrate"]
alias = "dev"
run = '''
django-admin runserver
'''

[tasks.celery]
description = "Run celery worker"
depends = ["redis"]
run = '''
celery -A watchtower_ce worker -P solo -l INFO
'''

[tasks.llm-server]
description = "Run llama.cpp inference server"
tools = { docker-cli = "29" }
usage = '''
flag "-m --model <model>" help="Path to GGUF model"
flag "-n --gpu-layers <gpu-layers>" help="GPU layers to offload" default="-1"
flag "-c --ctx-size <ctx-size>" help="Context size" default="131072"
flag "-f --flash-attn <flash-attn>" help="Use flash attention ('on', 'off', or 'auto')" default="on"
flag "-p --parallel <parallel>" help="Parallel request slots"
flag "-l --log-level <log-level>" help="Log level (0: generic output, 1: error, 2: warning, 3: info, 4:trace, 5: debug)" default="2"
flag "-H --host <host>" help="Host to bind to" default="0.0.0.0"
flag "-P --port <port>" help="Port to bind to" default="6767"
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail

if [ "${LLM_USE_MOCK_COMPLIANCE_CHECKER:-false}" = "true" ]; then
gum log -l info "Using mock compliance checker."
exit 0
fi

gum log -l info "Starting llama.cpp server"
MODEL_PATH="${usage_model:-$WTCE_BASE_MODEL_PATH}"
PARALLEL="${usage_parallel:-${LLM_INSTANCE_POOL_SIZE:-1}}"

docker run --rm \
  --gpus all \
  --name wtce-llm-server-dev \
  -p "${usage_port}:${usage_port}" \
  -v "$(dirname "${MODEL_PATH}"):/models:ro" \
  ghcr.io/ggml-org/llama.cpp:server-cuda13 \
  -m "/models/$(basename "${MODEL_PATH}")" \
  -ngl "${usage_gpu_layers}" \
  -c "${usage_ctx_size}" \
  -fa "${usage_flash_attn}" \
  -np "${PARALLEL}" \
  --host "${usage_host}" \
  --port "${usage_port}" \
  2>&1 | awk '{print "[" strftime("%Y-%m-%d %H:%M:%S") "]", $0}; fflush()'
'''

[tasks.backend]
description = "Starts the entire backend application"
depends = ["devserver", "celery", "llm-server"]

[tasks.stop-dev]
description = "Stop all running dev containers (requires containers to have the defined prefix)"
alias="stop"
wait_for = ["devserver", "celery"]
tools = { docker-cli = "29" }
usage = '''
flag "-p --prefix <prefix>" help="Prefix used for all project containers" default="wtce-"
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail

_CONTAINER_IDS="$(docker container ls -aqf name=${usage_prefix}.*-dev)"
_CONTAINER_IDS="${_CONTAINER_IDS//$'\n'/ }"

if [ -n "${_CONTAINER_IDS}" ]; then
  gum log -l warn "Stopping containers: ${_CONTAINER_IDS}"
  docker container stop ${_CONTAINER_IDS} >/dev/null
else
  gum log -l info "No wtce containers are running"
fi
'''

[tasks.clean-dev]
description = "Remove all development containers and volumes (requires containers to have the defined prefix)"
depends = ["stop-dev"]
alias="clean"
tools = { docker-cli = "29" }
usage = '''
flag "-p --prefix <prefix>" help="Prefix used for all project containers" default="wtce-"
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail

_CONTAINER_IDS="$(docker container ls -aqf name="${usage_prefix}.*-dev")"
_CONTAINER_IDS="${_CONTAINER_IDS//$'\n'/ }"
if [ -n "${_CONTAINER_IDS}" ]; then
  for id in ${_CONTAINER_IDS}; do
    _ATTACHED_VOLUMES="$(docker container inspect --format '{% raw %}{{ range .Mounts }}{{ if eq .Type "volume" }}{{ .Name }}{{ "\n" }}{{ end }}{{ end }}{% endraw %}' "${id}")"

    gum log -l warn "Removing container: ${id}"
    docker container rm -f "${id}"

    if [ -n "${_ATTACHED_VOLUMES}" ]; then
      gum log -l warn "Removing attached volumes: ${_ATTACHED_VOLUMES//$'\n'/ }"
      docker volume rm ${_ATTACHED_VOLUMES}
    else
      gum log -l info "No volumes attached to container: ${id}"
    fi
  done
else
  gum log -l info "No containers found with prefix: ${usage_prefix}"
fi
'''

[tasks.postgres-clientdb]
description = "Start a PostgreSQL client database with schema"
tools = { docker-cli = "29" }
usage = '''
flag "-n --container-name <container-name>" help="Name for the test postgres container" default="wtce-postgres-clientdb"
flag "-i --container-image <container-image>" help="Image to use for creating the postgres container" default="postgres:18-alpine"
flag "-P --port <port>" help="Port to listen on for postgresql connections" default="5433"
flag "-u --username <username>" help="superuser username" default="testuser"
flag "-p --password <password>" help="superuser password" default="testpassword"
flag "-d --database <database>" help="initial database name" default="testdb"
flag "-s --schema <schema>" help="Path to schema SQL file" default="./test_dbs/pci_dss/pg_schema.sql"
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail

if [ -n "$(docker container ls -qaf "name=${usage_container_name}")" ]; then
  gum log -l info "Starting postgres clientdb container: ${usage_container_name}"
  docker container start "${usage_container_name}"
else
  if [ ! -f "${usage_schema}" ]; then
    gum log -l error "Schema file not found: ${usage_schema}"
    exit 1
  fi

  gum spin --title "Creating postgres clientdb container" -- \
  docker container run -d \
  --name "${usage_container_name}" \
  -e "POSTGRES_USER=${usage_username}" \
  -e "POSTGRES_PASSWORD=${usage_password}" \
  -e "POSTGRES_DB=${usage_database}" \
  -p "${usage_port}:5432" \
  -v "${usage_container_name}-data:/var/lib/postgresql/data" \
  -v "$(realpath "${usage_schema}"):/docker-entrypoint-initdb.d/schema.sql:ro" \
  "${usage_container_image}"
fi

gum spin --title "Waiting for postgres clientdb to be ready" -- \
  timeout 90s bash -c \
  "until docker exec ${usage_container_name} pg_isready -U ${usage_username} -d ${usage_database} -q; \
  do sleep 1; done"

gum log -l info "Postgres clientdb is ready at localhost:${usage_port}"
gum log -l info "Connection string: postgresql://${usage_username}:${usage_password}@localhost:${usage_port}/${usage_database}"
'''

[tasks.mysql-clientdb]
description = "Start a MySQL client database with schema"
tools = { docker-cli = "29" }
usage = '''
flag "-n --container-name <container-name>" help="Name for the mysql clientdb container" default="wtce-mysql-clientdb"
flag "-i --container-image <container-image>" help="Image to use for creating the mysql container" default="mysql:oraclelinux9"
flag "-P --port <port>" help="Port to listen on for mysql connections" default="3306"
flag "-u --username <username>" help="superuser username" default="testuser"
flag "-p --password <password>" help="superuser password" default="testpassword"
flag "-d --database <database>" help="initial database name" default="testdb"
flag "-s --schema <schema>" help="Path to schema SQL file" default="./test_dbs/pci_dss/mysql_schema.sql"
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail

if [ -n "$(docker container ls -qaf "name=${usage_container_name}")" ]; then
  gum log -l info "Starting mysql clientdb container: ${usage_container_name}"
  docker container start "${usage_container_name}"
else
  if [ ! -f "${usage_schema}" ]; then
    gum log -l error "Schema file not found: ${usage_schema}"
    exit 1
  fi

  gum spin --title "Creating mysql clientdb container" -- \
  docker container run -d \
  --name "${usage_container_name}" \
  -e "MYSQL_USER=${usage_username}" \
  -e "MYSQL_PASSWORD=${usage_password}" \
  -e "MYSQL_DATABASE=${usage_database}" \
  -e "MYSQL_ROOT_PASSWORD=${usage_password}" \
  -p "${usage_port}:3306" \
  -v "${usage_container_name}-data:/var/lib/mysql" \
  -v "$(realpath "${usage_schema}"):/docker-entrypoint-initdb.d/schema.sql:ro" \
  "${usage_container_image}"
fi

gum spin --title "Waiting for mysql clientdb to be ready" -- \
  timeout 90s bash -c \
  "until docker exec ${usage_container_name} mysqladmin ping -u${usage_username} -p${usage_password} --silent 2>/dev/null; \
  do sleep 1; done"

gum log -l info "Mysql clientdb is ready at localhost:${usage_port}"
gum log -l info "Connection string: mysql://${usage_username}:${usage_password}@localhost:${usage_port}/${usage_database}"
'''

