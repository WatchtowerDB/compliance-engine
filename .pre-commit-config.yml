repos:
  # NOTE: Generic
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
  # NOTE: Python
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff-check
      - id: ruff-format
  # NOTE: MD and YAML files
  - repo: https://github.com/oxc-project/mirrors-oxfmt
    rev: v0.43.0
    hooks:
      - id: oxfmt
        types_or: [markdown, html, yaml]
  # NOTE: TOML
  - repo: https://github.com/tombi-toml/tombi-pre-commit
    rev: v0.9.17
    hooks:
      - id: tombi-format
      - id: tombi-lint
        # Skipping mise.toml due to known issues with schema validation.
        # See: https://github.com/jdx/mise/discussions/8254
        # It has been resolved as seen in the issue, but the fix does not
        # seem to be working, potentially because of a version mismatch.
        # Remove this exclusion once the issue is resolved and the fix is verified to be working.
        exclude: ^mise\.toml$
  # NOTE: Local CLIs
  - repo: local
    hooks:
      # NOTE: Shell scripts
      - id: shellcheck
        name: shellcheck
        language: unsupported
        types_or: [shell]
        entry: shellcheck
      - id: shfmt
        name: shfmt
        language: unsupported
        types_or: [shell]
        entry: shfmt
        args: [--write, -i, "2"]
