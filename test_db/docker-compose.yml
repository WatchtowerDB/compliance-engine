services:
  db:
    image: postgres:15
    container_name: my_postgres_container
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydatabase
    ports:
      - "5433:5432" # 5433 NOT 5432
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
