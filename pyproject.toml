[build-system]
requires = ["setuptools>=80", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[project]
name = "watchtower-ce"
dynamic = ["version"]
license = "GPL-3.0-or-later"
description = "Watchtower Compliance Engine API"
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.13",
  "Framework :: Django",
]
requires-python = ">= 3.13"
dependencies = [
  # NOTE: Backend
  "psycopg[binary,pool]~=3.0",
  "django~=5.2",
  "django-filter~=25.2",
  "django-cors-headers",
  "djangorestframework~=3.16",
  "djangorestframework-simplejwt~=5.5",
  "drf-spectacular~=0.28",
  "python-dotenv~=1.1",
  "uvicorn~=0.38",
  "click~=8.3",
  "yaspin~=3.3.0",
  # NOTE: AI
  "torch~=2.9.0",
  "torchvision~=0.24.0",
  "torchaudio~=2.9.0",
  "hf_xet~=1.2.0",
  "chromadb~=1.3.4",
  "huggingface-hub~=0.35.3",
  "langchain-chroma~=1.0.0",
  "langchain-community~=0.4.1",
  "langchain-huggingface~=1.0.1",
  "sentence-transformers~=5.1.2",
  "llama-cpp-python~=0.3",        # WARN: Must set environment variable CMAKE_ARGS="-DGGML_CUDA=on" to enable CUDA backend
]

[project.optional-dependencies]
tests = ["pytest", "pytest-django"]
dev = ["django-stubs", "djangorestframework-stubs", "pypdf"]

[project.scripts]
wtce = "watchtower_ce.cli.main:main"

[tool.setuptools]
include-package-data = true

[tool.setuptools_scm]

[tool.mypy]
disable_error_code = ["import-untyped"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "watchtower_ce.settings"
pythonpath = ["src"]
testpaths = ["tests"]
python_files = ["test_*.py"]

[tool.uv.sources]
torch = [
  { index = "torch-cu129", marker = "sys_platform == 'linux' or sys_platform == 'win32'" },
  { index = "torch-cpu", marker = "sys_platform == 'darwin'" },
]
torchvision = [
  { index = "torch-cu129", marker = "sys_platform == 'linux' or sys_platform == 'win32'" },
  { index = "torch-cpu", marker = "sys_platform == 'darwin'" },
]
torchaudio = [
  { index = "torch-cu129", marker = "sys_platform == 'linux' or sys_platform == 'win32'" },
  { index = "torch-cpu", marker = "sys_platform == 'darwin'" },
]

[[tool.uv.index]]
name = "torch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[[tool.uv.index]]
name = "torch-cu129"
url = "https://download.pytorch.org/whl/cu129"
explicit = true
